---
# Cluster connection (from sandbox)
ocp4_workload_tenant_argocd_user_openshift_api_url: "{{ sandbox_openshift_api_url }}"
ocp4_workload_tenant_argocd_user_openshift_api_token: "{{ cluster_admin_agnosticd_sa_token | trim }}"

# User to create AppProject for -- defaults to userX-GUID format
ocp4_workload_tenant_argocd_user_username: "user-{{ guid }}"

# ArgoCD configuration
ocp4_workload_tenant_argocd_user_namespace: openshift-gitops
ocp4_workload_tenant_argocd_user_project_prefix: "appproject-"
ocp4_workload_tenant_argocd_user_cluster_resource_whitelist: []
# Example:
# - group: ""
#   kind: Namespace

# Extra destination namespaces to allow in the AppProject.
# By default the project allows *-{{ username }}. Use this list
# to add namespaces that don't match that pattern (e.g. the
# primary sandbox namespace created by the sandbox API).
ocp4_workload_tenant_argocd_user_extra_destinations: []
# Example:
# - "sandbox-abc12-agent"
