---
# Cluster connection
ocp4_workload_tenant_gitea_user_openshift_api_url: "{{ sandbox_openshift_api_url }}"
ocp4_workload_tenant_gitea_user_openshift_api_token: "{{ cluster_admin_agnosticd_sa_token | trim }}"

# Namespace where the Gitea instance is deployed
ocp4_workload_tenant_gitea_user_namespace: gitea

# Name of the Gitea custom resource instance
# Must match what is deployed on the cluster to retrieve:
# - Gitea URL
# - Gitea admin credentials
ocp4_workload_tenant_gitea_user_instance: gitea

# User to create
ocp4_workload_tenant_gitea_user_username: ""
ocp4_workload_tenant_gitea_user_password: ""
ocp4_workload_tenant_gitea_user_email: "{{ ocp4_workload_tenant_gitea_user_username }}@example.com"

# Repositories to migrate for the user
ocp4_workload_tenant_gitea_user_repositories: []
# Example:
# - name: my-repo
#   repo: https://github.com/org/my-repo
#   private: false

# Semaphore for serializing Gitea operations across concurrent runs
ocp4_workload_tenant_gitea_user_semaphore_name: gitea-operations-lock
ocp4_workload_tenant_gitea_user_semaphore_retries: 60
ocp4_workload_tenant_gitea_user_semaphore_delay_min: 5
ocp4_workload_tenant_gitea_user_semaphore_delay_max: 20
ocp4_workload_tenant_gitea_user_semaphore_stale_timeout: 600
