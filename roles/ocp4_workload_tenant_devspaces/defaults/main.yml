---
# Cluster connection
ocp4_workload_tenant_devspaces_openshift_api_url: "{{ sandbox_openshift_api_url }}"
ocp4_workload_tenant_devspaces_openshift_api_token: "{{ cluster_admin_agnosticd_sa_token | trim }}"

# User configuration
ocp4_workload_tenant_devspaces_username: "user-{{ guid }}"

# User password (will be overridden if provided from tenant_keycloak_user role)
ocp4_workload_tenant_devspaces_user_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits,punctuation length=16') }}"

# Namespace (created by tenant_namespace role, passed as input)
ocp4_workload_tenant_devspaces_namespace: "{{ ocp4_workload_tenant_devspaces_username }}-devworkspace"

# DevWorkspace configuration
ocp4_workload_tenant_devspaces_devworkspace_name: "{{ ocp4_workload_tenant_devspaces_username }}-workspace"

# DevWorkspace devfile URL
# - URI mode (use_embedded_devfile: false): Points to DevSpaces dashboard API for editor
# - Embedded mode (use_embedded_devfile: true): Points to Git repository devfile
# Example for embedded: http://gitea.gitea.svc:3000/user/repo/raw/branch/main/devfile.yaml
ocp4_workload_tenant_devspaces_devworkspace_devfile: >-
  http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest

# Projects to clone into the devworkspace (list - leave empty for no projects)
# Each project must specify: name, git_repo, git_repo_base, and optionally git_revision
# The full git URL is constructed as: {git_repo_base}/{username}/{git_repo}.git
# Example:
# ocp4_workload_tenant_devspaces_devworkspace_projects:
# - name: modern-app-dev
#   git_repo: modern-app-dev
#   git_repo_base: http://gitea.gitea.svc:3000
#   git_revision: main
#   # Constructs: http://gitea.gitea.svc:3000/user-{guid}/modern-app-dev.git
# - name: external-lib
#   git_repo: myorg/some-library
#   git_repo_base: https://github.com
#   git_revision: v1.0
#   # Constructs: https://github.com/user-{guid}/myorg/some-library.git
ocp4_workload_tenant_devspaces_devworkspace_projects: []

# DevWorkspace components
ocp4_workload_tenant_devspaces_devworkspace_components:
- name: tooling
  container:
    image: registry.redhat.io/devspaces/udi-rhel8:latest

# ==================================================================
# Embedded Devfile Configuration
# ==================================================================

# Enable embedded devfile mode (creates DevWorkspaceTemplate + embeds devfile content)
ocp4_workload_tenant_devspaces_use_embedded_devfile: false

# DevWorkspaceTemplate name (for generic VS Code editor)
ocp4_workload_tenant_devspaces_devworkspace_template_name: "che-code-{{ ocp4_workload_tenant_devspaces_username }}"

# VS Code editor images (used when embedded devfile is enabled)
# yamllint disable-line rule:line-length
ocp4_workload_tenant_devspaces_che_code_image: "registry.redhat.io/devspaces/code-rhel9@sha256:5cd4fe568b4352bc5ef6ec0b16c3235fe515c2afb86fb076ed435cea65ea2247"
# yamllint disable-line rule:line-length
ocp4_workload_tenant_devspaces_udi_image: "registry.redhat.io/devspaces/udi-rhel9@sha256:024712461154d505de3180f4459363c46bc5d0fe7465d7e270108540ce8902fe"

# Environment variables to inject into devfile containers (when embedded mode is enabled)
# Example:
# ocp4_workload_tenant_devspaces_devfile_env_vars:
# - name: GIT_USERNAME
#   value: "{{ ocp4_workload_tenant_devspaces_username }}"
ocp4_workload_tenant_devspaces_devfile_env_vars: []

# SCC attribute for container builds
ocp4_workload_tenant_devspaces_scc: "container-build"

# VS Code / che-code workspace settings (applied to all workspaces)
# These settings are injected into the DevWorkspace attributes
# Example settings to disable auto-save (prevents AI code fixes from being auto-accepted):
# ocp4_workload_tenant_devspaces_vscode_settings:
#   files.autoSave: "off"
#   editor.formatOnSave: false
#   editor.codeActionsOnSave: {}
ocp4_workload_tenant_devspaces_vscode_settings: {}
