---
# Cluster connection
ocp4_workload_tenant_quay_openshift_api_url: "{{ sandbox_openshift_api_url }}"
ocp4_workload_tenant_quay_openshift_api_token: "{{ cluster_admin_agnosticd_sa_token | trim }}"

# Location of the Quay Registry on the cluster
ocp4_workload_tenant_quay_namespace: quay
ocp4_workload_tenant_quay_instance: quay

# Quay admin credentials secret (created by ocp4_workload_quay_operator)
ocp4_workload_tenant_quay_admin_credentials_secret: quay-admin-credentials

# User to create on Quay (set via AgV Tenant config)
ocp4_workload_tenant_quay_user: ""
ocp4_workload_tenant_quay_user_password: ""

# Namespace to set up the pipeline ServiceAccount with the Quay credentials
ocp4_workload_tenant_quay_pipeline_namespace: hummingbird-builds
