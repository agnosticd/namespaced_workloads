---
- name: Get Quay registry endpoint
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_tenant_gitea_user_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_gitea_user_openshift_api_token }}"
    validate_certs: false
    api_version: quay.redhat.com/v1
    kind: QuayRegistry
    name: "{{ ocp4_workload_tenant_quay_instance }}"
    namespace: "{{ ocp4_workload_tenant_quay_namespace }}"
  register: r_quay_registry
  failed_when: r_quay_registry.resources | length == 0

- name: Set Quay API URL
  ansible.builtin.set_fact:
    _ocp4_workload_tenant_quay_api_url: >-
      {{ r_quay_registry.resources[0].status.registryEndpoint }}

- name: Get Quay admin token from secret
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_tenant_gitea_user_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_gitea_user_openshift_api_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: quay-admin-token
    namespace: "{{ ocp4_workload_tenant_quay_namespace }}"
  register: r_quay_token_secret
  failed_when: r_quay_token_secret.resources | length == 0

- name: Set Quay admin token
  ansible.builtin.set_fact:
    _ocp4_workload_tenant_quay_token: >-
      {{ r_quay_token_secret.resources[0].data.token | b64decode }}

- name: Create Quay user
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_tenant_quay_api_url }}/api/v1/superuser/users/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ocp4_workload_tenant_quay_token }}"
    body_format: json
    body:
      username: "{{ ocp4_workload_tenant_quay_user }}"
      email: "{{ ocp4_workload_tenant_quay_user }}@example.com"
    validate_certs: false
    status_code:
    - 200
    - 400

- name: Set Quay user password
  ansible.builtin.uri:
    url: >-
      {{ _ocp4_workload_tenant_quay_api_url }}/api/v1/superuser/users/{{ ocp4_workload_tenant_quay_user }}
    method: PUT
    headers:
      Authorization: "Bearer {{ _ocp4_workload_tenant_quay_token }}"
    body_format: json
    body:
      password: "{{ ocp4_workload_tenant_quay_user_password }}"
    validate_certs: false
    status_code: 200

