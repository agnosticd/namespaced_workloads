---
- name: Get Quay registry endpoint
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_tenant_quay_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_quay_openshift_api_token }}"
    validate_certs: false
    api_version: quay.redhat.com/v1
    kind: QuayRegistry
    name: "{{ ocp4_workload_tenant_quay_instance }}"
    namespace: "{{ ocp4_workload_tenant_quay_namespace }}"
  register: r_quay_registry
  failed_when: r_quay_registry.resources | length == 0

- name: Set Quay API URL
  ansible.builtin.set_fact:
    _ocp4_workload_tenant_quay_api_url: >-
      {{ r_quay_registry.resources[0].status.registryEndpoint | trim | regex_replace('/$', '') }}

- name: Get Quay admin credentials from secret
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_tenant_quay_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_quay_openshift_api_token }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: "{{ ocp4_workload_tenant_quay_admin_credentials_secret }}"
    namespace: "{{ ocp4_workload_tenant_quay_namespace }}"
  register: r_quay_admin_secret
  failed_when: r_quay_admin_secret.resources | length == 0

- name: Set Quay admin credentials
  ansible.builtin.set_fact:
    _ocp4_workload_tenant_quay_admin_user: >-
      {{ r_quay_admin_secret.resources[0].data.username | b64decode | trim }}
    _ocp4_workload_tenant_quay_admin_password: >-
      {{ r_quay_admin_secret.resources[0].data.password | b64decode | trim }}
  no_log: true

- name: Get initial CSRF token
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_tenant_quay_api_url }}/csrf_token"
    method: GET
    validate_certs: false
    status_code: 200
  register: r_quay_csrf_initial

- name: Sign in to Quay as admin
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_tenant_quay_api_url }}/api/v1/signin"
    method: POST
    validate_certs: false
    headers:
      Cookie: "{{ r_quay_csrf_initial.cookies_string }}"
      X-CSRF-Token: "{{ r_quay_csrf_initial.json.csrf_token }}"
    body_format: json
    body:
      username: "{{ _ocp4_workload_tenant_quay_admin_user }}"
      password: "{{ _ocp4_workload_tenant_quay_admin_password }}"
    status_code: 200
  register: r_quay_signin
  no_log: true

- name: Get authenticated CSRF token
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_tenant_quay_api_url }}/csrf_token"
    method: GET
    validate_certs: false
    headers:
      Cookie: "{{ r_quay_signin.cookies_string }}"
    status_code: 200
  register: r_quay_csrf_auth

# -----------------------------------------------
# Delete all repositories owned by the user
# -----------------------------------------------
- name: List repositories for Quay user
  ansible.builtin.uri:
    url: >-
      {{ _ocp4_workload_tenant_quay_api_url }}/api/v1/repository?namespace={{
      ocp4_workload_tenant_quay_user }}
    method: GET
    validate_certs: false
    headers:
      Cookie: "{{ r_quay_signin.cookies_string }}"
      X-CSRF-Token: "{{ r_quay_csrf_auth.json.csrf_token }}"
    status_code: 200
  register: r_quay_user_repos

- name: Delete all repositories for Quay user
  when: r_quay_user_repos.json.repositories | default([]) | length > 0
  ansible.builtin.uri:
    url: >-
      {{ _ocp4_workload_tenant_quay_api_url }}/api/v1/repository/{{
      ocp4_workload_tenant_quay_user }}/{{ _repo.name }}
    method: DELETE
    validate_certs: false
    headers:
      Cookie: "{{ r_quay_signin.cookies_string }}"
      X-CSRF-Token: "{{ r_quay_csrf_auth.json.csrf_token }}"
    status_code:
    - 204
    - 404
  loop: "{{ r_quay_user_repos.json.repositories | default([]) }}"
  loop_control:
    loop_var: _repo
    label: "{{ _repo.name }}"

# -----------------------------------------------
# Delete the Quay user
# -----------------------------------------------
- name: Delete Quay user
  ansible.builtin.uri:
    url: >-
      {{ _ocp4_workload_tenant_quay_api_url }}/api/v1/superuser/users/{{
      ocp4_workload_tenant_quay_user }}
    method: DELETE
    validate_certs: false
    headers:
      Cookie: "{{ r_quay_signin.cookies_string }}"
      X-CSRF-Token: "{{ r_quay_csrf_auth.json.csrf_token }}"
    status_code:
    - 200
    - 204
    - 404

# -----------------------------------------------
# Clean up pipeline secrets from namespaces
# -----------------------------------------------
- name: Delete docker-registry secrets from namespaces
  when: ocp4_workload_tenant_quay_pipeline_namespaces | default([]) | length > 0
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_quay_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_quay_openshift_api_token }}"
    validate_certs: false
    state: absent
    api_version: v1
    kind: Secret
    name: quay-registry-credentials
    namespace: "{{ _pipeline_ns }}"
  loop: "{{ ocp4_workload_tenant_quay_pipeline_namespaces }}"
  loop_control:
    loop_var: _pipeline_ns
  failed_when: false
