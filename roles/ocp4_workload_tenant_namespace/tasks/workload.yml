---
# ==================================================================
# Create tenant namespaces and grant user access.
# Namespaces are listed in ocp4_workload_tenant_namespace_namespaces.
# This role owns the namespace lifecycle -- remove_workload.yml
# deletes them on destroy.
# ==================================================================

- name: Create tenant namespaces
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_namespace_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_namespace_openshift_api_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ns_item }}"
  loop: "{{ ocp4_workload_tenant_namespace_namespaces }}"
  loop_control:
    loop_var: ns_item

- name: Grant user access in each namespace
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_namespace_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_namespace_openshift_api_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ ocp4_workload_tenant_namespace_role }}-{{ ocp4_workload_tenant_namespace_username }}"
        namespace: "{{ ns_item }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ ocp4_workload_tenant_namespace_role }}"
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: "{{ ocp4_workload_tenant_namespace_username }}"
  loop: "{{ ocp4_workload_tenant_namespace_namespaces }}"
  loop_control:
    loop_var: ns_item
