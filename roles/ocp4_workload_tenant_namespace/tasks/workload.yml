---
# ==================================================================
# Build namespace list from suffixes + prefix, then create each.
# Pattern: {suffix}-{prefix}  e.g. librechat-sandbox-guid
# ==================================================================

- name: Build namespace list
  ansible.builtin.set_fact:
    _tenant_namespaces: >-
      {{ ocp4_workload_tenant_namespace_suffixes
         | map('regex_replace', '^(.+)$', '\1-' + ocp4_workload_tenant_namespace_prefix)
         | list }}

- name: Create tenant namespaces
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_namespace_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_namespace_openshift_api_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ns_item }}"
        labels:
          created-by: agnosticd
          tenant: "{{ ocp4_workload_tenant_namespace_prefix }}"
  loop: "{{ _tenant_namespaces }}"
  loop_control:
    loop_var: ns_item

- name: Apply ResourceQuota to namespace
  when: ocp4_workload_tenant_namespace_quota | length > 0
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_namespace_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_namespace_openshift_api_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: tenant-quota
        namespace: "{{ ns_item }}"
      spec:
        hard: "{{ ocp4_workload_tenant_namespace_quota }}"
  loop: "{{ _tenant_namespaces }}"
  loop_control:
    loop_var: ns_item

- name: Apply LimitRange to namespace
  when: ocp4_workload_tenant_namespace_limit_range | length > 0
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_namespace_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_namespace_openshift_api_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: tenant-limit-range
        namespace: "{{ ns_item }}"
      spec:
        limits:
        - type: Container
          default: "{{ ocp4_workload_tenant_namespace_limit_range.default | default({}) }}"
          defaultRequest: "{{ ocp4_workload_tenant_namespace_limit_range.defaultRequest | default({}) }}"
  loop: "{{ _tenant_namespaces }}"
  loop_control:
    loop_var: ns_item

- name: Grant user access in each namespace
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_tenant_namespace_openshift_api_url }}"
    api_key: "{{ ocp4_workload_tenant_namespace_openshift_api_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ ocp4_workload_tenant_namespace_role }}-{{ ocp4_workload_tenant_username }}"
        namespace: "{{ ns_item }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ ocp4_workload_tenant_namespace_role }}"
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: "{{ ocp4_workload_tenant_username }}"
  loop: "{{ _tenant_namespaces }}"
  loop_control:
    loop_var: ns_item
