---
# ------------------------------------------------
# Gitea instance provisioner for OCP Sandbox model
# Deploys a per-user Gitea instance via the Gitea operator CR
# ------------------------------------------------

# Cluster connection (from sandbox)
ocp4_workload_tenant_gitea_instance_openshift_api_url: "{{ sandbox_openshift_api_url }}"
ocp4_workload_tenant_gitea_instance_openshift_api_token: "{{ cluster_admin_agnosticd_sa_token | trim }}"

# Namespace where Gitea instance will be deployed
ocp4_workload_tenant_gitea_instance_namespace: gitea

# Gitea container image
ocp4_workload_tenant_gitea_instance_image: quay.io/rhpds/gitea
ocp4_workload_tenant_gitea_instance_image_tag: "1.25.4"
ocp4_workload_tenant_gitea_instance_volume_size: 2Gi

# PostgreSQL backend for Gitea
ocp4_workload_tenant_gitea_instance_postgresql_image: registry.redhat.io/rhel10/postgresql-16
ocp4_workload_tenant_gitea_instance_postgresql_image_tag: latest
ocp4_workload_tenant_gitea_instance_postgresql_volume_size: 2Gi

# Gitea admin credentials (set in the Gitea CR)
ocp4_workload_tenant_gitea_instance_admin_user: gitea-admin
ocp4_workload_tenant_gitea_instance_admin_password: ""
