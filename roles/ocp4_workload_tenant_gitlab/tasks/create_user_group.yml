---
# Create user's personal group and import repositories

- name: Get user's personal namespace
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_tenant_gitlab_url }}/api/v4/namespaces?search={{ ocp4_workload_tenant_gitlab_username }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ _ocp4_workload_tenant_gitlab_token }}"
    validate_certs: false
    status_code: 200
  register: r_namespaces

- name: Set user namespace ID fact
  ansible.builtin.set_fact:
    _ocp4_workload_tenant_gitlab_user_namespace_id: "{{ (r_namespaces.json | selectattr('path', 'equalto', ocp4_workload_tenant_gitlab_username) | list | first).id }}"

- name: Import repositories into user's namespace
  when: ocp4_workload_tenant_gitlab_user_repositories | length > 0
  block:
  - name: Import repositories
    ansible.builtin.uri:
      url: "{{ _ocp4_workload_tenant_gitlab_url }}/api/v4/projects"
      method: POST
      headers:
        PRIVATE-TOKEN: "{{ _ocp4_workload_tenant_gitlab_token }}"
        Content-Type: "application/json"
      body_format: json
      body:
        name: "{{ item.name }}"
        import_url: "{{ item.url }}"
        visibility: "{{ item.visibility }}"
        namespace_id: "{{ _ocp4_workload_tenant_gitlab_user_namespace_id }}"
      validate_certs: false
      status_code: [201, 400]
    loop: "{{ ocp4_workload_tenant_gitlab_user_repositories }}"
    loop_control:
      label: "{{ ocp4_workload_tenant_gitlab_username }}/{{ item.name }}"
    register: r_import_repos
    retries: 60
    delay: 10
    until: r_import_repos.status in [201, 400]

  - name: Wait for repository imports to complete
    ansible.builtin.uri:
      url: "{{ _ocp4_workload_tenant_gitlab_url }}/api/v4/projects/{{ item.json.id }}/import"
      method: GET
      headers:
        PRIVATE-TOKEN: "{{ _ocp4_workload_tenant_gitlab_token }}"
      validate_certs: false
      status_code: 200
    loop: "{{ r_import_repos.results }}"
    when:
    - item.status == 201
    - item.json is defined
    - item.json.id is defined
    loop_control:
      label: "{{ item.json.path_with_namespace | default('unknown') }}"
    register: r_import_status
    until:
    - r_import_status.json is defined
    - r_import_status.json.import_status is defined
    - r_import_status.json.import_status == 'finished'
    retries: 60
    delay: 10
